server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Variables pour CORS dynamique
    set $cors_origin "";
    if ($http_origin ~* "^https://(.*\.)?guardtrack\.com$") {
        set $cors_origin $http_origin;
    }
    if ($http_origin ~* "^https://guardtrack.*\.vercel\.app$") {
        set $cors_origin $http_origin;
    }
    if ($http_origin ~* "^http://localhost:[0-9]+$") {
        set $cors_origin $http_origin;
    }

    location /ping {
        access_log off;
        return 200 "pong";
    }

    location / {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, X-Requested-With, ngrok-skip-browser-warning' always;
        add_header 'Access-Control-Expose-Headers' 'Link, X-Total-Count' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, X-Requested-With, ngrok-skip-browser-warning';
            add_header 'Access-Control-Max-Age' 3600;
            return 204;
        }

        try_files $uri /index.php$is_args$args;
    }

    location /sync/health {
        access_log off;
        return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTPS off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}