server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Répondre aux requêtes OPTIONS (preflight) - DOIT ÊTRE EN PREMIER
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, X-Requested-With, ngrok-skip-browser-warning' always;
        add_header 'Access-Control-Max-Age' 3600 always;
        return 204;
    }

    location /ping {
        access_log off;
        add_header 'Access-Control-Allow-Origin' '*' always;
        return 200 "pong";
    }

    location / {
        # Headers CORS pour toutes les autres réponses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, X-Requested-With, ngrok-skip-browser-warning' always;
        add_header 'Access-Control-Expose-Headers' 'Link, X-Total-Count' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTPS off;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}