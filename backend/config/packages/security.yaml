security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall pour les routes publiques (sans authentification)
        public:
            pattern: ^/api/(ping|test|settings/public|auth/(login|register|refresh))
            stateless: true
            security: false

        # API firewall - tout le reste passe par JWT
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
            provider: app_user_provider

    access_control:
        # Routes publiques (déjà gérées par le firewall public)
        - { path: ^/api/ping, roles: PUBLIC_ACCESS }
        - { path: ^/api/test, roles: PUBLIC_ACCESS }
        - { path: ^/api/settings/public, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        
        # Routes authentifiées (tous rôles)
        - { path: ^/api/settings$, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
        - { path: ^/api/settings/ai/providers, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
        
        # Routes Admin uniquement
        - { path: ^/api/settings, roles: ROLE_ADMIN, methods: [PUT, POST] }
        - { path: ^/api/settings/ai/test, roles: ROLE_ADMIN, methods: [POST] }