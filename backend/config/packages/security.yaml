security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        ping:
            pattern: ^/ping
            stateless: true
            security: false

        public:
            pattern: ^/api/(ping|test|settings/public|auth/(login|register|refresh|verify-pin))
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~
            provider: app_user_provider

    access_control:
        - { path: ^/ping, roles: PUBLIC_ACCESS }
        - { path: ^/api/ping, roles: PUBLIC_ACCESS }
        - { path: ^/api/test, roles: PUBLIC_ACCESS }
        - { path: ^/api/settings/public, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/verify-pin, roles: PUBLIC_ACCESS, methods: [POST, OPTIONS] }
        - { path: ^/api/settings$, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
        - { path: ^/api/settings/ai/providers, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
        - { path: ^/api/settings, roles: ROLE_ADMIN, methods: [PUT, POST] }
        - { path: ^/api/settings/ai/test, roles: ROLE_ADMIN, methods: [POST] }